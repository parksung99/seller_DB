<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Team DM Manager</title>
  <style>
    * { box-sizing: border-box; }
    :root { --bg: #f5f6f8; --panel: #fff; --line: #dfe3e8; --text: #15171a; --muted: #667085; --accent: #0f766e; --accent-soft: #d9f3ef; --shadow: 0 10px 22px rgba(15, 23, 42, 0.08); }
    body { margin: 0; font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; background: var(--bg); color: var(--text); }
    header { min-height: 60px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 18px; background: var(--panel); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 2; }
    h1 { font-size: 17px; margin: 0; }
    h2 { font-size: 24px; margin: 0 0 4px; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 5px; }
    input, select, textarea { width: 100%; border: 1px solid #cfd6dd; border-radius: 8px; padding: 9px 10px; font: inherit; background: #fff; color: var(--text); }
    textarea { resize: vertical; min-height: 120px; }
    button, a.button { border: 1px solid #c7cdd4; background: #fff; border-radius: 8px; padding: 9px 12px; cursor: pointer; text-decoration: none; color: inherit; font: inherit; display: inline-flex; align-items: center; justify-content: center; min-height: 38px; }
    button.primary, a.primary { background: #111827; color: #fff; border-color: #111827; }
    button.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
    button:disabled { opacity: 0.55; cursor: wait; }
    main { display: grid; grid-template-columns: minmax(340px, 430px) 1fr; min-height: calc(100vh - 60px); }
    aside { background: var(--panel); border-right: 1px solid var(--line); max-height: calc(100vh - 60px); overflow: auto; }
    section { max-height: calc(100vh - 60px); overflow: auto; padding: 18px; }
    .toolbar { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; border-bottom: 1px solid var(--line); }
    .toolbar input { grid-column: 1 / -1; }
    .stats { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .muted { color: var(--muted); font-size: 12px; }
    .pill { display: inline-flex; align-items: center; border-radius: 999px; padding: 3px 8px; font-size: 12px; line-height: 1.5; background: #eef2f6; color: #344054; margin: 2px 3px 2px 0; white-space: nowrap; }
    .pill.high { background: #fee4e2; color: #b42318; }
    .pill.mid { background: #fff1c2; color: #8a5a00; }
    .pill.good { background: var(--accent-soft); color: #0f5f59; }
    .item { padding: 12px; border-bottom: 1px solid #edf0f2; cursor: pointer; }
    .item:hover, .item.active { background: #eef8f6; }
    .item-top { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; }
    .name { font-weight: 700; overflow-wrap: anywhere; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
    .plain { box-shadow: none; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .metric { border: 1px solid #edf0f2; border-radius: 8px; padding: 10px; background: #fafbfc; min-width: 0; }
    .metric strong { display: block; font-size: 20px; margin-top: 4px; overflow-wrap: anywhere; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0 12px; }
    .form-grid .full { grid-column: 1 / -1; }
    .empty { padding: 30px; text-align: center; color: var(--muted); }
    .auth { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 18px; background: rgba(17, 24, 39, 0.42); z-index: 10; }
    .auth.open { display: flex; }
    .auth-box { width: min(420px, 100%); background: #fff; border-radius: 8px; padding: 18px; box-shadow: var(--shadow); }
    .toast { position: fixed; right: 16px; bottom: 16px; max-width: min(420px, calc(100vw - 32px)); background: #111827; color: #fff; padding: 11px 13px; border-radius: 8px; display: none; z-index: 20; }
    .toast.show { display: block; }
    @media (max-width: 920px) { header { align-items: flex-start; flex-direction: column; } .stats { justify-content: flex-start; } main { grid-template-columns: 1fr; } aside, section { max-height: none; } .grid, .form-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 560px) { .toolbar, .grid, .form-grid { grid-template-columns: 1fr; } .toolbar input, .form-grid .full { grid-column: auto; } }
  </style>
</head>
<body>
  <header>
    <div><h1>&#54016; DM &#48156;&#49569; &#44288;&#47532;</h1><div id="memberLabel" class="muted"></div></div>
    <div id="stats" class="stats muted">&#48520;&#47084;&#50724;&#45716; &#51473;...</div>
  </header>
  <main>
    <aside><div class="toolbar"><input id="q" placeholder="&#49472;&#47084;&#47749;, &#54644;&#49884;&#53468;&#44536;, &#47700;&#47784; &#44160;&#49353;" /><select id="grade"></select><select id="review_status"></select><select id="dm_status"></select><select id="assignee"></select></div><div id="list" class="empty">&#54980;&#48372;&#47484; &#48520;&#47084;&#50724;&#45716; &#51473;&#51077;&#45768;&#45796;.</div></aside>
    <section><div id="detail" class="card">&#50780;&#51901; &#47785;&#47197;&#50640;&#49436; &#49472;&#47084;&#47484; &#49440;&#53469;&#54616;&#49464;&#50836;.</div></section>
  </main>
  <div id="auth" class="auth"><div class="auth-box"><h2>&#54016; &#51217;&#49549;</h2><p class="muted">&#54016; &#44277;&#50857; &#53076;&#46300;&#50752; &#48376;&#51064; &#51060;&#47492;&#51012; &#51077;&#47141;&#54616;&#47732; &#48320;&#44221;&#51088;&#44032; &#44592;&#47197;&#46121;&#45768;&#45796;.</p><label for="accessCode">&#51217;&#44540; &#53076;&#46300;</label><input id="accessCode" autocomplete="off" /><label for="memberName">&#51060;&#47492;</label><input id="memberName" autocomplete="name" /><div class="actions"><button class="accent" onclick="saveIdentity()">&#51077;&#51109;</button></div></div></div>
  <div id="toast" class="toast"></div>
  <script>
    const T = { allGrades: "\uB4F1\uAE09 \uC804\uCCB4", allReviews: "\uAC80\uD1A0 \uC804\uCCB4", allDm: "DM \uC804\uCCB4", allAssignees: "\uB2F4\uB2F9\uC790 \uC804\uCCB4", unreviewed: "\uBBF8\uD655\uC778", good: "\uC88B\uC74C", hold: "\uBCF4\uB958", excluded: "\uC81C\uC678", brandSent: "\uBE0C\uB79C\uB4DC\uC804\uB2EC", unsent: "\uBBF8\uBC1C\uC1A1", sent: "\uBC1C\uC1A1\uC644\uB8CC", replied: "\uB2F5\uC7A5\uC634", rejected: "\uAC70\uC808", high: "\uB192\uC74C", middle: "\uC911\uAC04", low: "\uB0AE\uC74C", gradeHigh: "\uC0C1", gradeMid: "\uC911", gradeLow: "\uD558" };
    const REVIEW_STATUSES = [T.unreviewed, T.good, T.hold, T.excluded, T.brandSent];
    const DM_STATUSES = [T.unsent, T.sent, T.replied, T.rejected, T.hold];
    const BRAND_FITS = ["", T.high, T.middle, T.low];
    const GRADES = [T.gradeHigh, T.gradeMid, T.gradeLow];
    let candidates = [], selected = null, assignees = [], saveTimer = null;
    const $ = (id) => document.getElementById(id);
    const esc = (value) => String(value || "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[char]));
    const split = (value) => String(value || "").split("|").map((item) => item.trim()).filter(Boolean);
    const identity = () => ({ code: localStorage.getItem("team_access_code") || "", name: localStorage.getItem("team_member_name") || "" });
    function fillSelect(id, label, values) { $(id).innerHTML = `<option value="">${label}</option>` + values.map((value) => `<option>${esc(value)}</option>`).join(""); }
    fillSelect("grade", T.allGrades, GRADES); fillSelect("review_status", T.allReviews, REVIEW_STATUSES); fillSelect("dm_status", T.allDm, DM_STATUSES); fillSelect("assignee", T.allAssignees, []);
    function toast(message) { $("toast").textContent = message; $("toast").classList.add("show"); clearTimeout(saveTimer); saveTimer = setTimeout(() => $("toast").classList.remove("show"), 2600); }
    function headers() { return { "x-team-access-code": identity().code }; }
    async function api(path, options = {}) { const response = await fetch(path, { ...options, headers: { ...headers(), ...(options.headers || {}) } }); const text = await response.text(); const data = text ? JSON.parse(text) : null; if (!response.ok) throw new Error(data?.error || "\uC694\uCCAD\uC5D0 \uC2E4\uD328\uD588\uC2B5\uB2C8\uB2E4."); return data; }
    function requireIdentity() { const saved = identity(); $("memberLabel").textContent = saved.name ? `${saved.name}\uB2D8\uC73C\uB85C \uAE30\uB85D \uC911` : "\uC774\uB984\uC744 \uC785\uB825\uD558\uBA74 \uBCC0\uACBD\uC790\uAC00 \uAE30\uB85D\uB429\uB2C8\uB2E4."; if (!saved.name) $("auth").classList.add("open"); }
    function saveIdentity() { const code = $("accessCode").value.trim(); const name = $("memberName").value.trim(); if (!name) return toast("\uC774\uB984\uC744 \uC785\uB825\uD574\uC8FC\uC138\uC694."); localStorage.setItem("team_access_code", code); localStorage.setItem("team_member_name", name); $("auth").classList.remove("open"); requireIdentity(); refresh(); }
    function statusClass(value) { if ([T.gradeHigh, T.good, T.sent, T.replied].includes(value)) return "good"; if ([T.gradeMid, T.hold, T.brandSent].includes(value)) return "mid"; if ([T.gradeLow, T.excluded, T.rejected].includes(value)) return "high"; return ""; }
    function formatDate(value) { if (!value) return ""; return new Intl.DateTimeFormat("ko-KR", { dateStyle: "short", timeStyle: "short" }).format(new Date(value)); }
    async function loadStats() { const stats = await api("/api/stats"); assignees = stats.assignees || []; $("stats").innerHTML = `<span>\uCD1D ${stats.total}\uBA85</span><span class="pill good">\uC0C1 ${stats.byGrade?.[T.gradeHigh] || 0}</span><span class="pill">${T.unsent} ${stats.byDmStatus?.[T.unsent] || 0}</span><span class="pill mid">${T.sent} ${stats.byDmStatus?.[T.sent] || 0}</span><button onclick="openIdentity()">\uC774\uB984/\uCF54\uB4DC \uBCC0\uACBD</button>`; renderAssigneeFilter(); }
    function renderAssigneeFilter() { const current = $("assignee").value; fillSelect("assignee", T.allAssignees, assignees); $("assignee").value = current; }
    async function loadCandidates() { const params = new URLSearchParams(); ["q", "grade", "review_status", "dm_status", "assignee"].forEach((id) => { if ($(id).value) params.set(id, $(id).value); }); candidates = await api(`/api/candidates?${params}`); if (selected) selected = candidates.find((item) => item.id === selected.id) || selected; else if (candidates[0]) selected = candidates[0]; renderList(); renderDetail(); }
    async function refresh() { try { await loadStats(); await loadCandidates(); } catch (error) { toast(error.message); if (error.message.includes("\uC811\uADFC \uCF54\uB4DC")) openIdentity(); } }
    function renderList() { if (!candidates.length) { $("list").className = "empty"; $("list").textContent = "\uC870\uAC74\uC5D0 \uB9DE\uB294 \uD6C4\uBCF4\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4."; return; } $("list").className = ""; $("list").innerHTML = candidates.map((item) => `<div class="item ${selected && selected.id === item.id ? "active" : ""}" onclick="selectCandidate(${item.id})"><div class="item-top"><span class="name">@${esc(item.seller_name)}</span><span class="pill ${statusClass(item.grade)}">${esc(item.grade || "-")}</span></div><div class="muted">\uC885\uD569 ${item.combination_score || 0} - \uBDF0\uD2F0 ${item.beauty_score || 0} - \uB313\uAE00 ${item.total_comments || 0}</div><div>${split(item.beauty_anchor_tags).slice(0, 4).map((tag) => `<span class="pill">${esc(tag)}</span>`).join("")}</div><div class="muted">${esc(item.review_status || T.unreviewed)} - ${esc(item.dm_status || T.unsent)} - \uB2F4\uB2F9 ${esc(item.assignee || "\uC5C6\uC74C")}</div></div>`).join(""); }
    function selectCandidate(id) { selected = candidates.find((item) => item.id === id); renderList(); renderDetail(); }
    function options(values, selectedValue) { return values.map((value) => `<option value="${esc(value)}" ${selectedValue === value ? "selected" : ""}>${esc(value || "\uC120\uD0DD \uC548 \uD568")}</option>`).join(""); }
    function renderDetail() { if (!selected) { $("detail").innerHTML = "\uC67C\uCABD \uBAA9\uB85D\uC5D0\uC11C \uC140\uB7EC\uB97C \uC120\uD0DD\uD558\uC138\uC694."; return; } const posts = split(selected.sample_post_urls); const updated = selected.status_updated_at ? `${esc(selected.status_updated_by || "unknown")} - ${formatDate(selected.status_updated_at)}` : "\uBCC0\uACBD \uAE30\uB85D \uC5C6\uC74C"; $("detail").innerHTML = `<div class="card plain"><h2>@${esc(selected.seller_name)}</h2><p class="muted">${esc(selected.category || "-")} - ${esc(selected.matched_hashtags || "")}</p><div class="actions"><a class="button primary" href="${esc(selected.profile_url)}" target="_blank" rel="noopener">\uD504\uB85C\uD544 \uC5F4\uAE30</a>${posts.map((url, index) => `<a class="button" href="${esc(url)}" target="_blank" rel="noopener">\uAC8C\uC2DC\uBB3C ${index + 1}</a>`).join("")}</div></div><div class="grid card"><div class="metric"><span class="muted">\uB4F1\uAE09</span><strong>${esc(selected.grade || "-")}</strong></div><div class="metric"><span class="muted">\uC885\uD569\uC810\uC218</span><strong>${selected.combination_score || 0}</strong></div><div class="metric"><span class="muted">\uC88B\uC544\uC694</span><strong>${selected.total_likes || 0}</strong></div><div class="metric"><span class="muted">\uB313\uAE00</span><strong>${selected.total_comments || 0}</strong></div></div><div class="card"><strong>\uBDF0\uD2F0 \uC2E0\uD638</strong><br>${split(selected.beauty_anchor_tags).map((tag) => `<span class="pill">${esc(tag)}</span>`).join("") || "<span class='muted'>\uC5C6\uC74C</span>"}<hr><strong>\uAD11\uACE0/\uD310\uB9E4 \uC2E0\uD638</strong><br>${split(selected.commercial_signal_tags).map((tag) => `<span class="pill high">${esc(tag)}</span>`).join("") || "<span class='muted'>\uC5C6\uC74C</span>"}<hr><strong>\uD3EC\uB9F7 \uC2E0\uD638</strong><br>${split(selected.format_signal_tags).map((tag) => `<span class="pill mid">${esc(tag)}</span>`).join("") || "<span class='muted'>\uC5C6\uC74C</span>"}</div><div class="card"><strong>\uD06C\uB864\uB9C1 \uADFC\uAC70 \uBA54\uBAA8</strong><p>${esc(selected.notes || "\uC5C6\uC74C")}</p></div><div class="card"><div class="form-grid"><div><label>\uAC80\uD1A0 \uC0C1\uD0DC</label><select id="edit_review_status">${options(REVIEW_STATUSES, selected.review_status || T.unreviewed)}</select></div><div><label>DM \uC0C1\uD0DC</label><select id="edit_dm_status">${options(DM_STATUSES, selected.dm_status || T.unsent)}</select></div><div><label>\uBE0C\uB79C\uB4DC \uC801\uD569\uB3C4</label><select id="edit_brand_fit">${options(BRAND_FITS, selected.brand_fit || "")}</select></div><div><label>\uB2F4\uB2F9\uC790</label><input id="edit_assignee" list="assigneeList" value="${esc(selected.assignee || identity().name)}" /><datalist id="assigneeList">${assignees.map((name) => `<option value="${esc(name)}"></option>`).join("")}</datalist></div><div class="full"><label>\uD300 \uBA54\uBAA8</label><textarea id="edit_memo">${esc(selected.memo || "")}</textarea></div></div><div class="muted">\uB9C8\uC9C0\uB9C9 \uBCC0\uACBD: ${updated}${selected.last_contacted_at ? ` - \uCD5C\uADFC \uC5F0\uB77D ${formatDate(selected.last_contacted_at)}` : ""}</div><div class="actions"><button id="saveBtn" class="accent" onclick="saveSelected()">\uC800\uC7A5</button></div></div>`; }
    async function saveSelected() { const person = identity().name || $("edit_assignee").value.trim(); if (!person) { openIdentity(); toast("\uC774\uB984\uC744 \uBA3C\uC800 \uC785\uB825\uD574\uC8FC\uC138\uC694."); return; } const button = $("saveBtn"); button.disabled = true; const patch = { review_status: $("edit_review_status").value, dm_status: $("edit_dm_status").value, brand_fit: $("edit_brand_fit").value, assignee: $("edit_assignee").value.trim(), memo: $("edit_memo").value, actor: person }; try { const updatedRows = await api(`/api/candidates/${selected.id}`, { method: "PATCH", headers: { "content-type": "application/json" }, body: JSON.stringify(patch) }); selected = updatedRows?.[0] || { ...selected, ...patch }; toast("\uC800\uC7A5\uD588\uC2B5\uB2C8\uB2E4."); await refresh(); } catch (error) { toast(error.message); } finally { button.disabled = false; } }
    function openIdentity() { const saved = identity(); $("accessCode").value = saved.code; $("memberName").value = saved.name; $("auth").classList.add("open"); }
    ["q", "grade", "review_status", "dm_status", "assignee"].forEach((id) => { $(id).addEventListener("input", () => loadCandidates().catch((error) => toast(error.message))); });
    requireIdentity(); refresh();
  </script>
</body>
</html>
